<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Ventas - Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 1.5rem; }
        
        .item-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 1fr; 
            gap: 10px; 
            align-items: center; 
            margin-bottom: 12px; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #eee; 
        }
        .header-row { font-weight: bold; color: #7f8c8d; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        
        label { font-size: 0.95rem; font-weight: 500; }
        input { 
            padding: 10px; 
            border: 2px solid #dfe6e9; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; }
        
        .subtotal { font-weight: bold; color: var(--success); text-align: right; font-size: 1rem; }
        
        .total-section { 
            margin-top: 25px; 
            padding: 20px; 
            background: var(--primary); 
            color: white; 
            border-radius: 12px; 
            text-align: center; 
        }
        .total-section span { font-size: 1.8rem; display: block; font-weight: bold; margin-top: 5px; }
        
        .btn-clear {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-clear:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Precios</h2>
    
    <div class="item-row header-row">
        <span>Producto</span>
        <span>Cant.</span>
        <span style="text-align: right;">Subtotal</span>
    </div>

    <div id="lista">
        <div class="item-row">
            <label>Bolsas ($15)</label>
            <input type="number" class="qty" data-precio="15" placeholder="0" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
        <div class="item-row">
            <label>Teléfono ($30)</label>
            <input type="number" class="qty" data-precio="30" placeholder="0" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
        <div class="item-row">
            <label>Utensilios ($10)</label>
            <input type="number" class="qty" data-precio="10" placeholder="0" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
        <div class="item-row">
            <label>Cajitas (Pack x3 $450)</label>
            <input type="number" class="qty" data-precio="450" placeholder="Packs" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
        <div class="item-row">
            <label>Ganzúas ($1000)</label>
            <input type="number" class="qty" data-precio="1000" placeholder="0" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
        <div class="item-row">
            <label>Regaderas ($300)</label>
            <input type="number" class="qty" data-precio="300" placeholder="0" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
        <div class="item-row">
            <label>Fertilizantes ($60)</label>
            <input type="number" class="qty" data-precio="60" placeholder="0" oninput="calcular()">
            <span class="subtotal">$0</span>
        </div>
    </div>

    <div class="total-section">
        TOTAL A COBRAR
        <span id="total-final">$0</span>
    </div>

    <button class="btn-clear" onclick="limpiar()">BORRAR TODO</button>
</div>

<script>
    function calcular() {
        let total = 0;
        const inputs = document.querySelectorAll('.qty');
        
        inputs.forEach(input => {
            const cantidad = parseFloat(input.value) || 0;
            const precio = parseFloat(input.getAttribute('data-precio'));
            const subtotal = cantidad * precio;
            
            input.parentElement.querySelector('.subtotal').innerText = `$${subtotal}`;
            total += subtotal;
        });

        document.getElementById('total-final').innerText = `$${total}`;
    }

    function limpiar() {
        const inputs = document.querySelectorAll('.qty');
        inputs.forEach(input => {
            input.value = '';
            input.parentElement.querySelector('.subtotal').innerText = '$0';
        });
        document.getElementById('total-final').innerText = '$0';
    }
</script>

</body>
</html>
