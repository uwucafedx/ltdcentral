<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Ventas y Costos</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 650px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        
        .item-row { 
            display: grid; 
            grid-template-columns: 2fr 0.8fr 1fr 1fr; 
            gap: 10px; 
            align-items: center; 
            margin-bottom: 12px; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #eee; 
            font-size: 0.9rem;
        }
        .header-row { font-weight: bold; color: #7f8c8d; border-bottom: 2px solid #ddd; }
        
        input { 
            padding: 8px; 
            border: 2px solid #dfe6e9; 
            border-radius: 6px; 
            text-align: center; 
            width: 100%;
            box-sizing: border-box;
        }

        .txt-costo { color: #95a5a6; font-size: 0.85rem; }
        .txt-venta { color: var(--success); font-weight: bold; }
        
        .totals-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        
        .total-box { 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            color: white;
        }
        .bg-venta { background: var(--primary); }
        .bg-costo { background: var(--warning); }
        
        .total-box span { font-size: 1.4rem; display: block; font-weight: bold; margin-top: 5px; }
        
        .btn-clear {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Ventas</h2>
    
    <div class="item-row header-row">
        <span>Producto</span>
        <span>Cant.</span>
        <span>Costo Total</span>
        <span style="text-align: right;">Venta Total</span>
    </div>

    <div id="lista">
        <div class="item-row">
            <label>Cajitas ($150 c/u)</label>
            <input type="number" class="qty" data-costo="150" data-venta="150" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Libretas (C:$150 / V:$450)</label>
            <input type="number" class="qty" data-costo="150" data-venta="450" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Bolsas (C:$5 / V:$15)</label>
            <input type="number" class="qty" data-costo="5" data-venta="15" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Ganzúas (C/V:$500)</label>
            <input type="number" class="qty" data-costo="500" data-venta="500" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Teléfono (C:$10 / V:$30)</label>
            <input type="number" class="qty" data-costo="10" data-venta="30" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Regaderas (C/V:$300)</label>
            <input type="number" class="qty" data-costo="300" data-venta="300" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Fertilizantes (C/V:$60)</label>
            <input type="number" class="qty" data-costo="60" data-venta="60" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
        <div class="item-row">
            <label>Utensilios (C:$1 / V:$10)</label>
            <input type="number" class="qty" data-costo="1" data-venta="10" placeholder="0" oninput="calcular()">
            <span class="sub-costo txt-costo">$0</span>
            <span class="sub-venta txt-venta" style="text-align: right;">$0</span>
        </div>
    </div>

    <div class="totals-container">
        <div class="total-box bg-costo">
            PRECIO COSTO
            <span id="total-costo">$0</span>
        </div>
        <div class="total-box bg-venta">
            PRECIO VENTA
            <span id="total-venta">$0</span>
        </div>
    </div>

    <button class="btn-clear" onclick="limpiar()">NUEVA VENTA</button>
</div>

<script>
    function calcular() {
        let totalVenta = 0;
        let totalCosto = 0;
        const inputs = document.querySelectorAll('.qty');
        
        inputs.forEach(input => {
            const cantidad = parseFloat(input.value) || 0;
            const pCosto = parseFloat(input.getAttribute('data-costo'));
            const pVenta = parseFloat(input.getAttribute('data-venta'));
            
            const subCosto = cantidad * pCosto;
            const subVenta = cantidad * pVenta;
            
            input.parentElement.querySelector('.sub-costo').innerText = `$${subCosto}`;
            input.parentElement.querySelector('.sub-venta').innerText = `$${subVenta}`;
            
            totalCosto += subCosto;
            totalVenta += subVenta;
        });

        document.getElementById('total-costo').innerText = `$${totalCosto}`;
        document.getElementById('total-venta').innerText = `$${totalVenta}`;
    }

    function limpiar() {
        const inputs = document.querySelectorAll('.qty');
        inputs.forEach(input => {
            input.value = '';
            input.parentElement.querySelector('.sub-costo').innerText = '$0';
            input.parentElement.querySelector('.sub-venta').innerText = '$0';
        });
        document.getElementById('total-costo').innerText = '$0';
        document.getElementById('total-venta').innerText = '$0';
    }
</script>

</body>
</html>
